body:
  text: 夢窗詞跋或云夢窗詞一巻或云凡四巻以甲乙丙丁釐目或又云四明吳君特從吳履齋諸公逰晚年好填詞謝世後同逰集其丙丁兩年稿若干篇釐為二巻末有鶯啼序遺缺甚多葢絶筆也與余家藏本合符既閲花菴諸刻又得逸篇九闋附存巻尾山陰尹煥序略云求詞于吾宋前有清真後有夢窗此非煥之言四海之公言也湖南毛晉識
