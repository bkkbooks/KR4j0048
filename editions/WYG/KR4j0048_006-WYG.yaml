front:
  text: 夢窗補遺
  hash: sha256:fbc6be74a08cf0bac00c750781a79d0340f0469542daa86143e32a6c918cfcff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0048_WYG_006-1a, image: WYG1488/WYG1488-0372a.png}
body:
  text: 聲聲慢閏重九飲郭園檀欒金碧婀娜蓬萊游雲不蘸芳洲露柳霜蓮十分㸃綴殘秋新彎畫眉未穏似含羞低度牆頭愁送逺駐西臺車馬芙惜臨流知道池亭多宴掩庭花長是驚落秦謳膩粉闌干猶聞凭䄂香留輸他翠漣拍甃瞰新粧終日凝眸簾半捲帶黄花人枉小樓倦尋芳餞周糾定夫草帆挂雨冰岸飛梅春思零亂送客將歸偏是故宫離苑醉酒曾同涼月舞尋芳還隔紅塵畫去難留悵芙容路窄緑楊天逺便繫馬鸎邊清曉煙草晴花沙潤香軟爛錦年華誰念故人遊倦寒食相思隄上路行雲應枉狐山畔寄新吟莫空囘五湖春㕍絳都春為清華内子夀香深霧㬉正人枉錦瑟年華深院舊日漢宫分得紅蘭滋吳苑臨池羞落梅花片弄水月初匀粧面紫煙籠處雙鸞芙跨洞簫低按歌筦紅圍翠䄂凍雲外似覺東風先轉繡畔晝遲花底天寛春無限仙郎驕馬瓊林宴待捲上珠簾教看更傳鸎入新年寳釵夢燕唐多令惜别何處合成愁離人心上秋縱芭蕉不雨也颼颼都道晚涼天氣好有明月怕登樓年事夢中休花空煙水流燕辭歸客尚淹留垂柳不縈裙帶住謾長是繫行舟法曲獻仙音和丁宏菴韵落葉霞翻敗窗風咽草色淒涼深院痩不闗秋淚縁生别情銷鬢霜千㸃悵翠冷搔頭燕􅄼能語恩怨紫簫逺記桃枝向隨春渡愁未洗鈆水又將恨染粉縞澀離箱忍重拈燈夜裁剪望極藍橋綵雲飛羅扇歌斷料鸎籠玉鏁夢裏隔花時見好事近秋飲雁外雨絲絲將恨和愁都織玉骨西風添痩減尊前歌力袖香曾枕醉紅腮依約唾痕碧花下凌波入夢引春雛雙鶒憶舊遊别黄澹翁送人猶未苦苦送春隨人去天涯片紅都飛盡陰陰潤緑暗裏啼鴉賦情頓雪雙鬢飛夢逐塵沙歎病渴淒涼分香痩減兩地看花西湖斷橋路想繫馬垂楊依舊欹斜葵麥迷煙處問離巢孤燕飛過誰家故人為寫深怨空壁埽秋蛇但醉上吳臺殘陽草色歸思賖宴清都病渴文園久梨花月夢殘春故人舊愁彈枕雨衰翻帽雪為情僝僽千金醉躍驕驄試問取朱橋翠柳痛恨不買斷斜陽西湖醖入春酒吳宫亂水斜煙留連倦客慵更囘首幽蛩韵苦哀鴻呌絶斷音難偶題紅汎葉零亂想夜泠江楓暗痩付與誰一半悲秋行雲枉否金縷歌陪履亝先生滄浪看梅喬木生雲氣訪中興英雄陳迹暗追前事戰艦東風慳借便夢斷神州故里旋小築吳宫閒地華表月明歸夜鶴歎當時花竹今如此枝上露濺清淚遨頭小簇行春隊步蒼苔尋幽别塢看梅開未重唱梅邊新度曲催發寒梢凍蕊此心與東君同意後不如今今非昔兩無言相對滄浪水懷此恨寄殘醉
