body:
  text: 夢窗丁稿卷四宋吳文英撰瑞龍吟賦蓬萊閣非舊刻雙調墮紅際層觀冷翠玲瓏五雲飛起玉虬縈結城痕淡煙半野斜陽半市瞰危梯門巷去來車馬夢遊宫蟻秦鬟古色凝愁鏡中暗換明眸皓齒東海青桑生處徑風吹淺瀛洲清泚山影泛出碧樹人世旗槍芽焙緑曾試雲根味巖流濺涎香怕攪驕龍春睡露草啼清淚酒香斷文丘廢隧今古秋聲裏情漫黯寒鴉孤村流水半空裏畫角落月地瑞鶴仙壽方蕙巖寺簿轆轤秋又轉記旋草新詞江頭慿雁乘槎上銀漢想車塵才踏東葉紅軟何時賜見漏聲涼移宫夜半問蓴鱸今幾西風未覺歲華遲晚一片丹心白髮滴露研朱雅陪清燕班回栁院蒲團底小禪觀望罘罳明月初圓此夕應共嬋娟茂苑願年年玉兔長生聳秋井幹思佳客閨中秋丹桂花開第二番東籬展却宴期寬人間寶鏡離仍合海上仙槎去復還分不盡半涼天可憐間􅓑此嬋娟素娥未隔三秋夢贏得今宵又倚闌沁園春賦方泉澄碧西湖軟紅南陌銀河地穿見華星影裏仙棊局靜清風行處瑞玉圭寒斜谷山深望春樓逺無此峭嶸小渭川春一泓地解不波不涸獨障狂瀾老蘇去後坡仙繼菊井佳名相與傳試摩挲徑石無令折角丁寧明月莫涴規圓漫結鷗盟那知魚樂心止中流别有天無塵夜聽吾伊正在秋水闌干齊天樂毗陵陪兩别駕宴丁園竹深不放斜陽入橫波淡墨林沼斷莽平煙殘荷􅓑水宜得秋深才好荒亭旋掃正著酒寒輕弄花春小障錦西風半圍歌袖半吟草遊清興易懶景饒人未勝樂事長少栁下停車尊前岸幘同撫雲根一笑秋香未老漸風雨西城暗欹客帽背日移舟亂鴉溪樹晚玉樓春為故人壽母華堂宿宴連清曉醉裏笙歌雲窈裊釀成千日酒初香過却重陽秋更好阿兒早晚成名了玉樹階前春滿抱天邊金鏡不須磨長與粧樓慙晚照醉落魄題藕花洲尼扇春溫紅玉纎衣學剪嬌鴉緑夜香燒短銀屏燭偷擲金錢重把寸心卜翠深不礙鴛鴦宿採菱誰記當時曲青山南畔紅雲北一葉波心明滅淡粧束蝶戀花題華山道女扇北斗秋橫雲髻影鶯羽衣輕腰減青絲􅓑一曲遊仙聞玉磬月華深院人初定十二闌干和笑憑風露生寒人在蓮花頂睡重不知殘酒醒幾度啼鴉瞑朝中措題蘭室道女扇楚臯相遇笑盈盈江碧逺山青露重寒香有恨月明秋珮無聲銀燈炙了金爐燼暖真色羅屏病起十分清瘦夢闌一寸春情江城梅花引贈倪梅村舊刻題誤江頭何處帶春歸玉川迷路東西一雁不飛雪壓凍雲低十里黃昏成曉色竹根籬分流水過翠微帶書傍月自鉏畦苦吟詩生鬢絲半黃細雨翠禽語似説相思惆悵孤山花盡草離離半幅寒香家住逺小簾垂玉人誤聽馬嘶杏花天詠湯蠻薑豆蔻相思味算却在春風舌底江清愛與消殘醉憔悴文園病起停嘶騎歌眉送意記曉色東城夢裏紫檀暈淺香波細腰斷垂楊小市倦尋芳花翁遇舊歡吳門老妓李憐邀分韻同賦此詞墜瓶恨井塵鏡迷樓空間孤燕寄别雀徽清瘦畫圖春面不約舟移楊栁繫有緣人映桃花見敘分攜悔香瘢漫爇緑鬟輕剪聽細語琵琶幽怨客鬢蒼華衫袖溼遍漸老芙容猶自帶霜花看一縷情深朱户掩兩痕愁起青山遠被西風又驚吹夢雲分散滿江紅劉朔亝賦菊和韻露浥初英蚤遺恨參差九日還却笑茰隨節過桂雕無色杯面寒香蜂共泛籬根秋訊蛩催織愛玲瓏篩月水屏風千枝結芳井韻寒泉咽霜著處微紅濕共評花索句看誰先得好漉烏巾連夜醉莫愁金鈿無人拾算遺蹤猶有枕囊留相思物朝中措聞桂香海束明月鎖雲隂花在月中心天外幽香輕漏人間仙影難尋并刀剪葉一枝曉露緑鬢曾簮惟有别時難忘冷煙疏雨秋深龍山會陪毗陵幕府諸名勝載酒雙清賞芙容石徑幽雲冷步帳深深豔錦青紅亞小橋和夢醒環珮香煙水茫茫城下何處不秋隂問誰借東風豔冶最嬌嬈愁侵醉霜淚灑紅綃搖落翠莽平沙挽斜陽駐短亭車馬曉粧羞未墮沈恨起金谷魂飛深夜驚雁落清歌酬花觥船快瀉去來捨月向井梧捎上挂夢行雲即六么花十八和趙修全韻簟波皺纎縠朝炊熟眠未足青奴細膩未拚真珠斛素蓮幽怨風前影搔頭斜墜玉畫闌枕水垂楊梳雨青絲亂如乍沐嬌笙微韻晚蟬亂秋曲翠隂明月勝花夜那愁春去速天香壽筠塘內子碧藕藏絲紅蓮並蒂荷塘水暖香斗窈窕文窗深沈書幔錦瑟歲華依舊洞簫韻裏同跨鶴青田碧岫菱鏡妝臺挂玉芙容豔褥鋪繡西鄰障蓬漂手共華朝夢闌分秀未冷綺簾猶捲淺冬時候秋到霜黃半畝便準擬攜花就君酒花酒年華天長地久謁金門和勿亝韻雞唱晚斜照西窗白暖一枕午酲幽夢逺素衾春絮軟紫燕紅樓歌斷錦瑟華年一箭偷果風流輸曼倩畫隂爭繡線鶯啼序和趙修全韻非舊刻分四段橫塘棹穿豔錦引鴛鴦弄水斷霞晚笑折花歸紅紗籠護燈蕊潤玉瘦氷輕倦浴斜拖鳯股盤雲墜聽銀水聲細梧桐漸攪涼思窗隙流光冉冉迅羽訴空梁燕子誤驚起風竹敲門故人還又不至記琅玕新詩陳迹搯香痕纎蔥玉指怕因循羅扇恩疏又生秋意西湖舊日畫舸頻移不定歎幾縈夢寐霞珮冷飛雨乍溼鮫綃暗盛紅淚波心宿處練單夜共瓊簫吹月霓裳舞尚明朝未覺花容悴嫣香易落回頭淡碧銷煙鏡空晝羅屏裏殘蟬度曲唱徹西園也感紅怨翠省慣吳宫幽憩暗栁退涼曉岸參斜露零鷗起絲縈寸藕留連歡事桃笙平展湘浪影有昭華穠李氷相倚如今鬢點淒霜半篋秋詞恨盈蠧紙點絳唇香泛羅屏夜寒著酒宜偎倚翠偏紅墜喚起芙容睡一曲伊州秋色芭蕉裏嬌和醉眼情心事愁隔湘江水繞佛閣贈郭李隱蒨霞豔錦星媛夜織河漢鳴杼紅翠萬縷送幽夢與人間秀芳句怨宫恨羽孤劍漫倚無限淒楚賦情縹眇東風搖揚陳陳沾花絮鏡裏半髯雪詞老春深鶯曉處長閉翠隂幽坊楊栁戶看故苑離離遍生禾黍短藜青屨笑寄隱間追雞社歌舞最風流墊巾沾雨夜遊宫人去西樓雁杳敘别夢揚州一覺雲淡疏星楚山曉聽啼烏立河橋話未了雨外蛩聲早細織就霜絲多少説與蕭娘未知道向長安對秋燈幾人老如夢令春在緑窗楊栁人與流鶯俱瘦眉底莫寒生簾額時翻波皺風驟風驟花徑啼紅滿袖醉桃源荷塘小隱賦燭影金丸一樹帶霜華銀臺搖豔霞燭隂樹影兩交加秋紗機上花飛醉筆駐吟車香浮小隱家明朝客夢付啼鴉歌闌月未斜綘都春餞李太博赴括蒼别駕長亭旅雁斂倦羽寄栖牆隂年晚問字翠樽刻燭紅箋慳曾展氷灘鳴珮舟如箭笑烏幘臨風重岸可憐垂栁清霜萬縷送將人逺吳苑千金未散買新賦共賞文園詞翰流水翠微明月清風平分半花深驛路香不斷萬玉舞罘罳東苑祇應花底春多軟紅霧暖漢宫春壽王虔州懷得銀符卷朝衣歸袖猶惹天香星移太微幾度飛出西江吳城駐馬趂肥鱸臘蟻初嘗紅霧底金門候曉爭如小隊春行何用倚樓看鏡算橘中深趣日月偏長江山待吟秀句梅靨催粧東風水暖弄煙嬌語燕飛檣來歲醉鵲樓勝處紅圍舞袖歌裳瑶花分韻得作字戲虞宜興秋風采石羽扇揮兵認紫騮飛躍江蘺塞草應笑春空鎖凌煙髙閣胡歌秦隴問鐃鼓新詞誰作有秀蓀來染吳香瘦馬青芻南陌氷澌細響長橋蕩波底蛟腥不涴霜鍔烏絲醉墨紅袖暖十里湖山行樂老仙何處算洞府光隂如昨想地寬多種桃花豔錦東風成幄瑞鶴仙壽雲麓先生記年時秋半看畫堂凝香璇奎初煥天邊歲華轉向九重春近仙桃傳宴銀罌翠管寶香飛蓬萊小苑感玉皇恩重千秋翠麓崚齊雲漢須看鴻飛髙處野濶天寬弋人空羡梅清水暖苕溪畔幾吟卷算金門聽漏玉墀班平贏得風霜滿臉總不如緑野身安鏡中未晚暗香送魏勻濱宰吳縣解組分韻得闔字縣花誰葺記滿庭燕麥朱扉斜闔妙手作新公館青紅曉雲溼天際疏星趂馬畫簾隙氷絃三疊盡換却吳水吳煙桃李靚春靨風急送帆葉正雁水夜清卧虹平帖軟紅路接塗粉闈深早催入懷暖天香宴果花隊簇輕軒銀燭便問訊湖上栁兩堤翠匝淒涼犯又名瑞鶴仙影賦重臺氷仙空江浪濶清塵凝層層刻碎氷葉水邊照影華裙曳翠露搔淚溼湘煙莫合塵襪凌波半涉怕臨風欺瘦骨護冷素衣疊樊姊玉奴恨小鈿疏唇洗粧輕怯汜人最苦粉痕深幾重愁靨花溢香濃猛􅝪透霜絹細摺倚瑶臺十二金錢暈半貼思佳客癸卯除夜舊刻失題自唱新詞送歲華鬢絲添得老生涯十年舊夢無尋處幾度新春不在家衣懶換酒難賖可憐此夕看梅花隔年昨夜青燈在無限粧樓盡翠華宴清都送馬林屋赴南宫分韻得動字栁色春隂重東風力快將雲雁髙送書檠細雨吟窗亂雪天寒筆凍家林秀橘霜老笑分得蟾邊桂種應茂苑斗轉蒼龍淮潮獻竒吳鳯玉眉暗隱華年凌雲氣壓千載雲夢名箋淡墨恩袍翠草紫騮青鞚飛香杏園新句眩醉眼春遊乍縱弄喜音鵲繞庭花紅簾影動六醜壬寅歲吳門元夕風雨漸新鵝映栁茂苑鎖東風初掣館娃舊遊羅襦香未滅玉夜花節記向留連處看街臨晚放小簾低揭星河瀲灩春雲熱笑靨欹梅仙衣舞纈澄澄素娥宫闕醉西樓十二銅漏催徹紅消翠歇歎霜簪練髮過眼年光舊情盡别泥深厭聽啼鴂恨愁霏潤沁陌頭塵襪青鸞香鈿車音絶却因甚不把歡期付與少年華月殘梅瘦飛趂風雪丙夜永更説長安夢燈花正結蕙蘭芳引賦陳藏一家吳郡王畫圖墨蘭空翠纏雲楚山迥故人南北秀骨冷盈盈一段風流結東清洗九畹料未許千金輕儥淺笑還輕語蔓草羅裙一幅素女情多阿真嬌重喚寒空谷弄野色煙姿宜掃怨蛾淡墨光風入戶媚香傾國湘佩寒幽夢小窗春足探芳信為春瘦更瘦如梅花花應知否任枕函雲墜離懷半中酒雨聲樓閣春寒裏寂寞收燈後甚年年鬬草心期探花時候嬌懶強拈繡暗背裏相思間供晴晝玉合羅囊蘭膏漬透紅豆舞衣疊損金泥鳯妬折闌干栁幾多愁兩點天涯逺岫惜黃花慢賦菊粉靨金裳映繡屏認得舊曰蕭娘翠微髙處故人帽底一年最好偏是重陽避春只怕春不逺傍幽徑偷理秋妝殢醉鄉寸心似剪漂蕩愁觴潮腮笑入清霜鬬萬花樣巧深染蜂黃露痕千點自憐舊色寒泉半掬百感幽香雁聲不到東籬畔滿城但風雨淒涼最斷腸夜深怨蝶飛狂金縷歌為德清趙令君賦小垂虹浪影龜紋皺蘸平煙青紅半溼枕溪窗牖千尺晴虹映碧漪萬疊蘿屏擁繡漫幾度吳船回首歸興五湖應不到向滄茫釣雪人知否樵唱杳度深秀重來趂得花時候記留連空山夜雨短亭春酒桃李新栽成蹊處盡是行人去後但東閣官梅清瘦欸乃一聲山水緑燕無言風定紅簾晝寒正悄嚲吟袖青玉案重到溪葵園東風客雁溪邊道帶春去隨春到認得踏青香徑小傷髙懷逺亂雲深處目斷湖山杳梅花似惜行人老不忍輕飛送殘照一曲秦娥春態少幽香誰採舊寒猶在歸夢啼鶯曉浣溪沙題李中笙舟中梅屏氷骨清寒瘦一枝玉人初上木蘭時懶粧斜立淡春姿月落溪窮清影在日長春去畫簾垂五湖水色掩西施探芳信雲麓小園早飲客供棋事琴事舊刻缺半調轉芳徑見霧捲晴漪魚弄遊影旋解纓濯翠臨枰長日靜修林竹色花香處意足多新詠試把龍唇供來時舊寒才定門巷都深靜但酒敵曉寒共消日永舊曲漪瀾待留向月中聽藻蘋密布官溝水任泛流紅冷小闌干笑拍東風醇醒採桑子瑞香茜羅結就丁香顆顆顆相思猶記年時一曲春風酒一巵綵鸞依舊乘雲到不負心期清睡濃時香趂銀屏蝴蝶飛三妹媚薑石帚館水磨方氏會飲總宜即事寄毛荷塘酣春清鏡裏照清波明眸暮雲愁斂半緑垂絲正楚腰纎瘦舞衣初試燕客漂零煙樹冷青驄曾繫畫館朱橋還把清尊慰春憔悴離苑幽芳深閉恨淺薄東風褪香銷膩綵箑翻歌最賦情偏在笑紅顰翠暗拍闌干看散盡斜陽船市付與嬌鶯金衣清曉花深未起水龍吟雲麓新茸北墅園池好山都在西湖斗城轉北多流水屋邊五畝橋通雙沼平煙蘸翠旋疊雲根半開竹徑鷗來須避四時長把酒臨花傍月無一日不春意獨樂當時高致醉吟篇如今還繼舉見日葵心傾須早圖歸計浮碧亭泛紅波迥桃源人世待天香應候開時又勝翠隂青子燭影搖紅雲麓夜燕園亭新月侵階綵雲林外笙簫透銀臺雙引繞花行紅墜香沾袖不管籖聲轉漏更明朝棋消永晝靜中間看倦羽飛還遊雲出岫隨處春光翠隂那抵西湖栁去年溪上牡丹時還試長安酒都把愁懷抖擻笑流鶯啼春漫瘦曉風盡惡妬雪寒銷梅梢成豆又毛荷塘生日留京不歸賦以寄意西子西湖賦情合載鴟夷棹斷橋直去是孤山應為梅花到幾度吟昏醉曉背東風偷間鬭草亂鴉啼後解珮歸來春懷多少千里嬋娟茂園今夜同清照櫻脂茸唾聽吟詩爭似還家好昵昵西窗語笑鳯雲深瓊簫縹眇願春如舊栁帶同心花枝壓帽望江南二月暮花落更情濃人去鞦韆間挂月馬停楊栁倦嘶風堤畔畫船空厭厭醉長日小簾櫳宿燕夜歸銀燭外啼鶯聲在緑隂中無處覔殘紅天香賦􅝪衣香珠絡玲瓏羅囊間鬬酥懷暖麝相倚百和花鬚十分風韻半襲鳯箱重綺茜晴四角慵未結流蘇春睡􅝪度紅薇院落煙銷畫屏沈水溫泉絳綃乍試露華侵透肌蘭泚漫省淺溪月夜暗浮花氣荀令如今老矣但未識韓郎舊風味逺寄相思餘􅝪夢裏江神子賦洛北碧沼小庵長安門外小林丘碧壺秋浴輕鷗不放啼紅流水透宫溝時有晴空雲過影華鏡裏翳魚遊綺羅塵滿九街頭晚香樓夕陽收波面琴髙仙子駕黃蚪清磬數聲人定了池上月照虛舟沁園春送翁賓陽遊􅀈渚情如之何暮途為客忍堪送君便江湖天逺中宵同舟關河秋近何日清塵玉麈生風貂裘明雪幕府英雄今幾人行清早料剛腸肯殢淚眼難顰平生秀句清尊到帳動風開自有神聽夜鳴黃鶴樓髙百尺朝馳白馬筆掃千軍賈傅才髙嶽家軍壯好勒燕然石上文到今日念故人老矣甘卧間雲採桑子水亭花上三更月扇與人間弄影闌干玉燕重抽櫳墜簪心期偷卜新蓮子秋入眉山翠破紅殘半簟湘波生曉寒清平樂書梔子扇柔柯剪翠蝴蝶雙飛起誰墮玉鈿花徑裏香帶􅝪風臨水露紅滴瀝秋枝金泥不染禪衣結得同心成了任教春去多時燕歸梁書水仙扇白玉搔頭墜髻鬆怯冷翠裙重當時離珮解丁東淡雲低暮江空青絲結帶鴛鴦盞歲華晚又相逢緑塵湘水避春風步歸來月宫中西江月江上桃花流水天涯芳草青山樓臺春鎖碧雲灣都入行人望眼一鏡波平鷗去千林落日鴉還天風裊裊送輕帆驀過星槎銀漢滿江紅翠幕深庭露紅晚間花自發春不斷亭臺成趣翠隂蒙密紫燕雛飛簾額靜金鱗影轉池心濶有花香竹色賦間情供吟筆間問字評風月時載酒調氷雪似初秋入夜淺涼欺葛人境不教車馬近醉鄉莫放笙歌歇倩雙成一曲紫雲回紅蓮折夜行船寓化度寺鴉帶斜陽歸逺樹無人聽數聲鐘暮日與愁長心灰香斷月冷竹房扃户畫扇青山吳苑路傍懷袖夢飛不去憶别西池紅綃盛淚腸斷粉蓮啼露好事近僧房聽琴琴冷石牀雲海上偷傳新曲彈作一簷風雨碎芭蕉寒緑氷泉輕瀉翠筒香林果薦紅玉早是一分秋意到臨窗修竹浣溪沙波面銅花冷不收玉人垂釣理纎鈎月明池閣夜來秋江燕話歸成曉别水花紅減似春休西風梧井葉先愁風入松雲麓園堂燕客一番疏雨洗芙容玉冷珮丁東轆轤聽帶秋聲轉早涼生傍井桐歡宴涼宵好月佳人修竹清風臨池飛閣乍青紅移酒小垂虹貞元供奉梨園曲稱十香深蘸璚鍾醉夢孤雲曉色笙歌一𣲖秋空鷓鴣天化度寺作池上紅衣伴倚闌栖鴉常帶夕陽還殷雲度雨疏桐落明月生涼寶扇間鄉夢窄水天寬小窗愁黛淡秋山吳鴻好為傳歸信楊栁閶門屋數間虞美人影詠香橙黃包先著風霜徑獨占一年佳景點點吳鹽雪凝玉膾和虀冷洋園誰識黃金徑一棹洞庭秋興香薦蘭臯湯鼎殘酒西窗醒訴衷情片雲載雨過江鷗水色淡汀洲小蓮玉慘紅怨翠被又經秋涼意思到南樓小簾鈎半窗燈暈幾葉芭蕉客夢牀頭花上月令文園消渴愛江清酒腸怯怕深觥玉舟曾洗芙容水瀉清氷秋夢淺醉雲輕庭竹不收簾影去人睡起月空明瓦瓶汲井和秋葉薦吟醒夜深重怨遙更卜算子涼挂曉雲輕聲度西風小井上梧桐應未知一葉雲鬟裊來雁帶書遲别燕歸程早頻探秋香開未開恰似春來了秋霽賦雲麓水園長橋一水盈盈漢影隔遊塵淨洗寒緑秋沐平煙日回西照乍驚飲虹天北綵蘭翠馥錦雲直下花成屋試縱目空際醉來風露跨黃鵠追想縹眇釣雪松江恍然煙蓑秋夢重續問何如臨池膾玉扁舟空艤洞庭宿也勝飲湘然楚竹夜久人悄玉妃喚月歸來挂笙聲裏水宫六六鳯栖梧甲辰七夕開過南枝花滿院新月西樓相約同針線髙樹數聲蟬送晚歸家夢向斜陽斷夜色銀河情一片輕帳偷歡銀燭羅屏怨陳迹曉風吹霧散簾鈎空帶蛛絲捲江神子喜雨上麓翁一聲玉磬下星壇步虛闌露華寒平曉阿香油壁碾青鸞應是老鱗眠不得雲炮落海潮翻身間猶耿寸心丹炷爐煙暗祈年隨處蛙聲鼓吹稻花田秋水一池蓮葉晚吟喜雨拍闌干齊天樂飲白醪感少年事芙蓉心上三更露茸香潄泉玉井自洗銀舟徐開素酌月落空杯無影庭隂未暝度一曲新蟬韻秋堪聽瘦骨侵氷怕驚紋簟夜深冷當時湖上載酒翠雲開處共雪面波鏡萬感璚漿千莖鬢雪煙鎖藍橋花徑留連暮景但願覔孤歡強寬秋興醉倚修篁晚風吹半醒賀新郎湖山有所贈湖上芙蓉早向北山煙深霧冷更看花好流水茫茫城下夢空指遊仙路杳笑蘿嶂雲屏親到玉雪肌膚春溫夜飲湖光山緑成花貌臨澗水弄清照著愁不盡宫眉小聽一聲相思曲裏賦情多少紅日闌干鴛鴦枕畔柱裙腰褪了算誰識垂楊秋裊不是秦樓無緣分點吳霜羞戴簪花帽但殢酒任天曉霜天曉角題胭脂嶺陶氏門煙林褪葉紅藕藉遊人屧十里秋聲松路嵐雲重翠濤涉佇立間素箑畫屏蘿嶂疊明月雙成歸去天風裏鳯笙浹烏夜啼桂花西風先到巖扃月籠明金露啼珠滴翠小雲屏一顆顆一星星是秋情香裂碧窗煙破醉魂醒夜行船逗曉闌干霑露水歸期杳畫簷鵲喜粉汗餘香傷秋中酒月落桂花影裏屏曲巫山和夢倚行雲重夢飛不起紅葉中庭緑塵斜曳應是寶筝慵理鳯栖梧化度寺池蓮一花最晚有感湘水煙中相見早羅蓋低籠紅拂猶嬌小粧鏡明星爭晚照西風日送凌波杳惆悵來遲羞窈窕一霎留連相伴闌干悄今夜西池明月到餘香翠被空秋曉生查子秋社當樓月半奩曾買菱花處愁影背闌干素髮殘風露神前雞酒盟歌斷秋香户泥落畫梁空夢想青春語尾犯甲辰中秋舊刻失題紺海掣微雲金井暮涼梧韻風息何處樓髙想清光先得江汜冷氷綃乍洗素娥歡菱花再拭影留人去忍向夜深簾戶照陳迹竹房苔徑小對日莫教煙碧露蓼香輕記年時相識二十五聲聲秋點夢不認屏山路窄醉魂悠揚滿地桂隂無人惜慶春宫殘葉翻濃餘香棲苦障風怨動秋聲雲影搖寒波塵銷膩翠房人去深扄畫成淒黯雁飛過垂楊轉青闌干橫暮酥印痕香玉腕誰慿菱花乍失娉婷别岸圍紅千豔傾城重洗清杯同追深夜豆花寒落愁燈近歡成夢斷雲隔巫山幾層偷相憐處重盡金篝消瘦雲英霜天曉角舊刻失題香莓幽徑滑縈繞秋曲折簾額紅搖波影魚驚墜暗吹沫浪濶輕棹撥武陵曾話别一點煙紅春小桃花夢半林月漢宫春壽梅津名壓年芳倚竹根新影獨照清漪千年禹梁蘚碧重發南枝氷凝素質遣凡桃羞濯塵姿寒正峭東風似海香浮夜雪春霏練鵲錦袍仙使有青娥傳夢月轉參移逋山傍鶯繫馬玉剪新辭宫妝鏡裏笑人間花訊都遲春未了紅鹽薦鼎江南煙雨黃時西江月丙午冬至添線繡牀人倦翻香羅幕煙斜五更簫鼓貴人家門外曉寒嘶馬帽壓半簷朝雪鏡開千靨春霞小簾沽酒看梅花夢到林逋山下浣溪沙中冬望後出迓履翁舟中即興新夢遊仙駕紫鴻數家燈火灞陵東吹簫樓外凍雲重石瘦溪根船宿處月斜梅影曉寒中玉人無力倚東風戀繡衾頻摩書眼怯細文小窗隂天氣似昏獸爐暖慵添困帶茶煙微潤寶􅝪少年嬌馬西風冷舊春衫猶涴酒痕夢不到梨花路斷長橋無限暮雲無悶催雪霓節飛瓊鸞駕弄玉杳隔平雲弱水倩皓鶴傳書衛姨呼起莫待粉河凝曉趂夜月瑶笙飛環珮蹇驢吟影茶煙竈冷酒亭門閉歌麗泛碧蟻放繡箔半鈎寶臺臨砌要須借東君灞陵春意曉夢先迷楚蝶早風戾重寒侵羅被還怕掩深院梨花又作故人清淚杏花天鬢稜初剪玉纎弱早春入屏山四角少年買困成歡謔人在濃香繡幄霜絲換梅殘夢覺夜寒重長安紫陌東風入户先情薄吹老燈花半蕚醉桃源元日五更櫪馬靜無聲鄰雞猶怕驚日華平曉弄春明莫寒愁翳生新歲夢去年情殘宵半酒醒春風無定落梅輕斷鴻長短亭菩薩蠻落花夜雨辭寒食塵香明日城南陌玉靨溼斜紅淚痕千萬重傷春頭竟白來去春如客人瘦緑隂濃日長簾影中夢窗絶筆鶯啼序缺吳駕雲閬海缺春空燦綺倒銀海燕影西城缺天鏡無際綵翼曳扶搖宛轉雲龍虹尾交相曳缺髙處缺笑語吹墜缺清濯緇塵缺屏障一一鶯花薜蘿紅香流水缺領客缺離席而語敢詫京兆缺成良慶會賡歌熙載隆都缺間暇遺缺雅飾繁華地平瞻太極缺天缺納璇題缺靜夜沈秋缺風觀闕麗日缺正午洗盡脂痕茸唾淨捲麯塵永晝低垂繡帷十二髙軒駟馬峩冠鳴珮班回花底修褉飲御爐香分惹朝衣袂碧桃數點飛花湧出宫溝陽春萬里淳祐十一年二月甲子四明吳文英君特書夢窗補遺聲聲慢閏重九飲郭園檀欒金碧婀娜蓬萊遊雲不蘸芳洲露栁霜蓮十分點綴殘秋新彎畫眉未穩似含羞低度牆頭愁送逺駐西臺車馬共惜臨流知道池亭多宴掩庭花長是驚落秦謳膩粉闌干猶聞憑袖香留輸他翠漣拍甃瞰新粧終日凝眸簾半捲帶黃花人在小樓倦尋芳餞周糾定夫暮帆挂雨氷岸飛梅春思零亂送客將歸偏是故宫離苑醉酒曾同涼月舞尋芳還隔紅塵面去難留悵芙蓉路窄緑楊天逺便繫馬鶯邊清曉煙草晴花沙潤香軟爛錦年華誰念故人遊倦寒食相思隄上路行雲應在孤山畔寄新吟莫空回五湖春雁絳都春為清華內子夀香深霧暖正人在錦瑟年華深院舊日漢宫分得紅蘭滋吳苑臨池羞落梅花片弄水月初勻粧面紫煙籠處雙鸞共跨洞簫低按歌管紅圍翠袖凍雲外似覺東風先轉繡畔畫遲花底天寬春無限仙郎驕馬瓊林宴待捲上珠簾教看更傳鶯入新年寶叉夢燕唐多令惜别何處合成愁離人心上秋縱芭蕉不雨也颼颼都道晚涼天氣好有明月怕登樓年事夢中休花空煙水流燕辭歸客尚淹留垂栁不縈裙帶住漫長是繫行舟法曲獻仙音和丁宏庵韻落葉霞翻敗窗風咽暮色淒涼深院瘦不關秋淚緣生别情銷鬢霜千點悵翠冷搔頭燕那能語恩怨紫簫遠記桃枝向隨春渡愁未洗鉛水又將恨染粉縞澀離箱忍重拈燈夜裁剪望極藍橋綵雲飛羅扇歌斷料鶯籠玉鎖夢裏隔花時見好事近秋飲雁外雨絲絲將恨和愁都織玉骨西風添瘦減尊前歌力袖香曾枕醉紅腮依約唾痕碧花下凌波入夢引春雛雙鶒憶舊遊别黃淡翁送人猶未苦苦送春隨人去天涯片紅都飛盡隂隂潤緑暗裏啼鴉賦情頓雪雙鬢飛夢逐塵沙歎病渴淒涼分香瘦減兩地看花西湖斷橋路想繫馬垂楊依舊欹斜葵麥迷煙處問離巢孤燕飛過誰家故人為寫深怨空壁掃秋蛇但醉上吳臺殘陽草色歸思賒宴清都病渴文園久梨花月夢殘春故人舊愁彈枕雨衰翻帽雪為情僝僽千金醉躍驕驄試問取朱橋翠栁痛恨不買斷斜陽西湖醖入春酒吳宫亂水斜煙留連倦客慵更回首幽蛩韻苦哀鴻呌絶斷音難偶題紅泛葉零亂想夜冷江楓暗瘦付與誰一半悲秋行雲在否金縷歌陪履亝先生滄浪看梅喬木生雲氣訪中興英雄陳迹暗追前事戰艦東風慳借便夢斷神州故里旋小築吳宫間地華表月明歸夜鶴歎當時花竹今如此枝上露濺清淚遨頭小簇行春隊步蒼苔尋幽别塢看梅開未重唱梅邊新度曲催發寒梢凍蕊此心與東君同意後不如今今非昔兩無言相對滄浪水懷此恨寄殘醉夢窗丁稿卷四
