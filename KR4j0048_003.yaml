body:
  text: 夢窗乙稿跋余家藏書未備如四明吳夢窗詞稿二十年前僅見丙丁二集因遂授梓蓋尺錦寸繡不忍祕諸枕中也今又得甲乙二冊但錯簡紛然如風裏落花誰是主此南唐後主亡國詞䜟也無可奈何花落去似曽相識燕歸來巧對晏元獻公與江都尉同遊池上一段佳話久已耳熱豈容攘美又如秦少遊門外緑隂千頃蘇子瞻敲門試問野人家周美成倚樓無語理瑶琴歐陽永叔佳人初試薄羅裳之類各入本集不能條舉但如雲接平岡對宿煙收諸篇自注附某集者姑仍之未識誰主誰賓也古虞毛晉識欽定四庫全書夢窗丙稿卷三宋吳文英撰丹鳯吟賦陳宗之藝居樓麗錦長安人海避影繁華結廬深寂燈窗雪户光映夜寒東壁心雕鬢改鏤氷刻水縹簡離離風籖索索怕遣花蟲蠧粉自採秋藝􅝪架香泛纎碧更上新梯窈窕暮山淡著城外色舊雨江湖逺問桐隂門巷燕曾相識吟壺天小不覺翠蓬雲隔桂斧月宫三萬手計元和通籍軟紅滿路誰聘幽素客喜遷鶯甲辰冬至寓越兒輩尚留瓜涇蕭寺冬分人别渡倦客晚潮傷頭俱雪雁影秋空蝶情春蕩幾處路窮車絶把酒共溫寒夜倚繡添慵時節又底事對愁雲江國離心還折吳越重㑹面撿㸃舊吟同看燈花結兒女相思年華輕送鄰户斷簫聲噎待移杖藜雪後猶怯蓬萊寒濶晨起懶任鴉林催曉梅窗沈月栁梢青與龜翁登研山觀雪懷癸卯嵗臘朝斷橋並馬之游斷夢游輪孤山路杳越樹隂新流水凝酥征衫沾淚都是離痕玉屏風冷愁人醉爛漫梅花翠雲傍夜船回惜春門掩一鏡香塵生查子稽山對雪有感暮雲千萬重寒夢家鄉逺愁見越溪娘鏡裏梅花面醉情啼枕氷往事分叉燕三月灞陵橋心剪東風亂玉漏遲中秋雁邊風訊小飛瓊望杳碧雲先晚露冷欄干定怯藕絲氷腕淨洗浮雲片玉勝花影春燈相亂秦鏡滿素娥未肯分秋一半每圓處即良宵甚此夕偏饒對歌臨怨萬里嬋娟幾許霧屏雲幔孤兔淒涼照水曉風起銀河西轉摩淚眼瑶臺夢回人遠一剪梅贈友人遠目傷心樓上山愁裏長眉别後蛾鬟暮雲低壓小欄干教問孤鴻因甚先還瘦倚溪橋梅夜寒雪欲銷時淚不禁彈剪成叉勝待歸看春在西窗燈火更闌㸃絳唇越山見梅春未來時酒攜不到千巖路瘦還如許晚色天寒處無限新愁難對風前語行人去暗銷春素橫笛空山暮絳都春題蓬萊閣燈屏螺屏暖翠正霧捲暮色星河浮霽路幕遞香街馬衝塵東風細梅槎凌海橫鼇背倩穩載蓬萊雲氣寶街斜轉氷娥素影夜清如水應記千秋化鶴舊華表認得山川猶是暗解繡囊爭擲金錢游人醉笙歌曉度晴霞外又上苑春生一葦便教接宴鶯花萬紅鏡裏祝英臺近除夜立春剪紅情裁緑意花信上叉股殘日東風不放歲華去有人添燭西窗不眠侵曉笑聲轉新年鶯語舊尊俎玉纎曾擘黃柑柔香繫幽素歸夢湖邊還迷鏡中路可憐千㸃吳霜寒銷不盡又相對落梅如雨燭影搖紅元夕微雨碧淡山姿暮寒愁沁歌眉淺障泥南陌潤輕酥燈火深深院入夜笙歌漸暖綵旗翻宜男舞遍恣游不怕素襪塵生行裙紅濺銀燭籠紗翠屏不照殘梅怨洗粧清靨溼春風宜帶啼痕看楚夢留情未散素娥愁天長信逺曉窗移枕酒困香殘春隂簾捲掃花遊賦瑶圃萬象皆春堂暖波印日倒秀影秦山曉鬟梳洗步帷艷綺正梁園未雪海棠猶睡藉緑盛紅怕委天香到地畫船繫舞西湖暗黃虹卧新霽天夢春枕被和鳯筑東風宴歌曲水海宫對起燦驪光乍溼杏梁雲氣夜色瑶臺禁蠟初傳翡翠喚春醉問人間幾番桃李西江月賦瑶圃青梅枝上晚花枝裊一痕雪在葉藏幾豆春濃玉奴最晚嫁東風來結梨花幽夢香力添􅝪羅被瘦肌猶怯氷綃緑隂青子老溪橋羞見東鄰嬌小宴清都餞嗣榮仲享還京翠羽飛梁苑連催發暮檣留話江燕塵階墮珥瑶扉乍鑰綵繩雙罥新煙暗葉成隂效翠嫵西陵送逺又趂得蕊露天香春留建章花晚歸來笑折仙桃瓊樓宴蕚金漏催箭蘭亭秀語烏絲潤墨漢宫傳玩紅歌醉玉天上倩鳯尾時題畫扇問幾時重駕巫雲蓬萊路淺桃源憶故人越山青斷西陵浦一岸密隂疏雨潮帶舊愁生莫曾折垂楊處桃根桃葉當時渡嗚咽風前柔櫓燕子不留春住空寄離檣語浣溪沙題史菊屏扇門巷深深小畫樓闌干曾識憑春愁新蓬遮却繡鵷游桃觀日斜香掩户蘋溪風起水東流紫茰玉腕又逢秋木蘭花慢夀秋壑記瓊林宴起軟紅路幾西風想漢影千年荆江萬頃杳信長通金狨錦韀賜馬又霜橫漢節棗仍紅細栁春隂喜色四郊秋事年豐從容歲晚玉關長不閉靜邊鴻訪武昌舊壘山川相繆日費詩筒蘭宫繫書翠羽帶天香飛下玉芙容明月瑶笙奏徹倚樓黃鶴聲中水龍吟遇秋壑湖上舊居寄贈小湖北嶺雲多小園暗碧鶯啼處朝回勝賞墨池香潤吟船繫雨霓節千妃錦帆一箭攜將春去算歸期未卜青煙散後春城詠飛花句黃鶴樓頭月午奏玉龍江梅解舞􅝪風紫禁嚴更清夢思懷幾許秋水生時賦情還在南屏别墅看章臺走馬長堤種取柔絲千樹夜行船贈趙梅壑碧甃清漪方鏡小綺疏淨半塵不到古鬲香深宫壼花換留取四時春好樓上眉山雲窕窈香衾夢鎮疏清曉並蒂蓮開合歡屏暖玉漏又催朝早朝中措贈趙梅壑吳山相對越山青湘水一春平粉字情深題葉紅波香染浮萍朝雲暮雨玉壺塵世金屋瑶京晚雨西陵潮汛沙鷗不似身輕塞翁吟餞梅津除郎赴闕有約西湖去移棹曉折芙容算終是稱心紅染不盡􅝪風千桃過眼春如夢還認錦疊雲重弄晚色舊香中旋撑入深叢從容情猶賦氷車健筆人未老南屏翠峯轉河影浮查信早素妃呌海目歸來太液池東紅衣卸了結子成蓮夭徑秋濃風入松夀梅壑一帆江上暮潮平騎鶴過瑶京湘波山色青天外紅香蕩玉珮東丁西圃仍圓夜月南風微弄秋聲阿咸才俊翠壺氷王母最憐生萬年枝上千年葉垂楊鬢春共青青連喚碧筒傳酒雲回一曲雙成燭影搖紅越上霖雨應禱秋入燈花夜深簷影琵琶語越娥青鏡洗紅埃山鬬秦眉嫵相間金茸翠畝認城隂春耕舊處晚舂相應新稻炊香疏煙林莽清磬風前海沈宿裊芙蓉炷阿香秋夢起嬌啼玉女傳幽素人駕海查未渡試梧桐聊分宴俎採菱别調留取蓬萊霎時雲住尾犯贈浪翁重客吳門翠被落紅粧流水膩香猶共吳越十載江楓冷霜波成纈燈院靚涼花乍剪桂園深幽香旋折醉雲吹散晚樹細蟬時替離歌咽長亭曾送客偷賦錦雁留别淚接孤城渺平蕪煙濶半菱鏡青門重售採香堤秋蘭共結故人憔悴逺夢越來溪畔月水龍吟夀嗣榮王望中璇海波新訊查又匝銀河轉金風細裊龍枝聲奏鈞簫秋逺南極飛仙夜來催駕祥光重見紫霄承露掌瑶池䕃密蟠桃秀螽蓮綻新棟晴翬凌漢半凉生蘭繁書卷繡裳五色昆臺十二香深簾捲花蕚樓高處連清曉千秋傳宴賜長生玉字鸞回鳯舞下蓬萊殿宴清都夀秋壑翠匝西門栁荆州昔未來時正春瘦如今䞉舞西風舊色勝東風秀黃梁露溼秋江轉萬里雲檣蔽晝正虎落馬靜晨嘶連營夜沈刁斗含章換幾桐隂千官邃幄韶鳯還奏席前夜人天低燕密御香盈袖星槎信約長在醉興渺銀河賦就對小弦月挂南樓涼浮桂酒聲聲慢夀方泉鶯團棖徑鱸躍蓴波重來雨過中秋酒市漁鄉西風勝似春柔宿舂去年村墅看黃雲還委西疇鳯池去信吳人有分借與遲留應是香山續夢又凝香追詠重到蘇州青鬢江山足成千歲風流圍腰御仙花底襯月中金粟香浮夜燕久攬秋雲平倚畫樓永遇樂乙巳中秋風雨風拂塵徽雨侵涼榻才動幽思緩酒消更移燈傍影淨洗芭蕉耳銅華滄海愁霾重嶂燕北雁南天外算隂晴渾似幾番渭城故人離㑹青樓舊日髙歌取醉玉妃淨几梳洗紅葉流光蘋花兩鬢心事成秋水白凝虛曉香吹輕爐倚窗小瓶疏桂問深宫嫦娥正在妬雲第幾西江月登蓬萊閣看桂清夢重遊天上古香吹下雲頭簫聲三十六宫愁髙處花驚風驟客路羈情不斷闌干晚色先收千山濃緑未成秋誰見月中人瘦朝中措題陸桂山詩集殷雲凋葉晚晴初籬落認奚奴才近西窗燈火旋收殘夜琴書秋深露重天空海濶玉界香浮木落秦山清瘦西風幾許工夫秋蕊香和吳見山賦落桂寶月驚塵墮曉愁瑣空枝殘照古苔幾㸃露螢小銷減秋光旋少佩丸尚憶春酥裊故人老斷香忍和淚痕掃魂返東籬夢杳惜秋華八月飛翼樓登髙思渺西風悵行踪浪逐南飛髙雁怯上翠微危樓更堪憑晚蓬萊對起幽雲淡野色山容愁捲清淺瞰滄波靜銜秋痕一線十載寄吳苑慣東籬深處把露黃偷剪移暮景照越鏡意銷香斷秋娥賦得閒情倚翠尊小眉初展深勸待明朝醉巾重岸聲聲慢和沈時亝八日登髙韻慿髙入夢搖落關情寒香吹盡空巖墜葉銷紅欲題秋訊難緘重陽正隔殘照趂西風不響雲尖乘半暝看殘山灌翠􅓑水開奩暗省長安年少幾傳杯弔甫把菊招潛身老江湖心隨飛雁天南烏紗倩誰重整映風林鈎玉纎纎漏聲起亂星河入影畫簷㸃絳唇和吳見山韻金井空隂枕痕厯盡秋聲閙夢長難曉月樹愁鴉悄梅壓檐梢寒蝶尋香到窗黏了翠池春小波冷鴛鴦覺又有懷蘇州明月茫茫夜來應照南橋路夢遊熟處一枕啼秋雨可惜人生不向吳城住心期誤雁將秋去天逺青山暮慶春宫題錢得閒園池春屋圍花秋池沿草舊家錦籍川原蓮尾分津桃邊迷路片紅不到人間亂篁蒼暗料惜把行題共刪小晴簾捲獨占西嬙一鏡清寒風光未老吟潘嘶騎征塵秖付慿欄鳴瑟傳杯辟邪翻燼繫船香斗春寬晚林青外亂鴉著斜陽幾山粉銷莫染猶是秦宫緑擾雲鬟蝶戀花和吳見山韻明月枝頭香滿路幾日西風落盡花如雨倒照秦眉天鏡古秋明白鷺雙飛處自摘霜蔥宜薦俎可惜重陽不把黃花與帽墮笑慿纎手取清歌莫送秋聲去玉樓春和吳見山韻闌干獨倚天涯客心影暗雕風葉寂千山秋入雨中青一雁暮隨雲去急霜花强弄春顔色相弔年光澆大白海煙沈處倒殘霞一杼鮫綃和淚織栁梢青題錢得閒四時圖畫翠嶂圍屏留連迅景花外油亭淡色煙昏濃光清曉一幅閒情輞川落日漁罾寫不盡人間四并亭上秋聲鶯能春語難入丹青燭影搖紅餞馮深居翼日深居初度飛蓋西園晚秋恰勝春天氣霜花開盡錦屏空紅葉新裝綴時放清杯泛水暗淒涼東風舊事夜吟不就松影䦨干月籠寒翠莫唱陽關但慿綵袖歌千歲秋星入夢隔明朝十載吳宫㑹一棹回潮渡葦正西窗燈花報喜栁蠻櫻素試酒爭憐不教不醉齊天樂與馮深居登禹陵三千年事殘鴉外無言倦慿秋樹逝水移川高陵變谷那識當時神禹幽雲怪雨翠萍溼空梁夜深飛去雁起青天數行書似舊藏處寂寥西窗坐久故人慳㑹遇同剪燈語敗蘚殘碑零圭斷璧重拂人間塵土霜紅罷舞漫山色青青霧朝煙暮岸鎖春船畫旗賽鼓水龍吟夀梅津杜陵折栁狂吟硯波尚溼紅衣露仙桃宴早江梅春近還催客句宫漏傳雞禁門嘶騎宦情熟處正黃編夜展天香字暖春蔥剪紅蜜炬宫帽鸞枝醉舞思飄揚臞仙風舉星羅萬卷雲驅千陳飛豪海雨長壽杯深探春腔穩江湖同賦又看看便繫金狨鶯曉傍西湖路又用見山韻餞别夜分溪館漁燈巷聲乍寂西風定河橋送逺玉簫吹斷霜絲舞影薄絮秋雲淡蛾山色宦情歸興怕煙江渡後桃花又泛宫溝上春流緊新句欲題還省透香煤重箋誤隱西園已負林亭移酒松泉薦茗攜手同歸處玉奴喚緑窗春近想驕驄又踏西湖二十四番花訊浣溪沙陳少逸席上用聨句韻有贈秦黛橫愁送暮雲越波秋淺暗啼昏空庭春草緑如裙綵扇不歌原上酒青門頻返月中魂花開空憶倚闌人又一曲鸞簫别綵雲燕叉塵澀鏡華昏灞橋舞色褪藍裙湖上醉迷西子夢江頭春斷倩離魂旋緘紅淚寄行人探春慢龜翁下世後登研山苔徑曲深深不見故人輕敲幽户細草春回目送流光一羽重雲冷哀雁斷翠微空愁蝶舞逞鳴鞭游蓬小夢枕殘驚寤還識西湖醉路向栁下並鞍銀袍吹絮事影難追那負燈牀聞雨氷溪慿誰照影有明月乘興去暗相思梅孤瘦共江亭暮塞垣春丙午歲旦漏瑟侵瓊管潤鼓借烘爐暖藏鈎怯冷畫難臨曉鄰語鶯轉殢緑窗細呪浮梅盞換蜜炬花心短夢驚回林鴉起曲屏春事天逺迎路栁絲裙看爭拜東風盈灞橋岸髻落寶叉寒恨花勝遲燕漸街簾影轉還似新年過郵亭一相見南陌又燈火繡囊塵香淺一剪梅賦處靜以梅花枝見贈老色頻生玉鏡塵雪淡春姿越看精神溪橋人去幾黃昏流水泠泠都是啼痕細雨輕寒莫掩門蕚緑燈前酒帶香溫風情誰道不因春春到一分花瘦一分木蘭花慢餞韓似亝赴江東醝幕潤寒梅細雨捲燈火暗塵香正萬里胥濤流光漲膩春共東江雲檣未傳燕語過罘罳垂栁舞鵝黃留取行人繫馬軟紅深處聞鶯霽月清風凝望久悠揚鄖山蒼又紫簫一曲還吹别調楚際吳傍仙方袖中袐寶遣蓬萊弱水變飛霜寒食春城秀句赴花飛入宫牆探芳信賀雲麓先生祕閣滿月探春到見綵花叉頭玉燕來早正紫龍眠重明月弄清曉夜塵不沁銀河水金盎供新澡鎮帷犀護緊東風秀藏芝草星斗燦懷抱問霧暖藍田玉長多少禁苑傳香栁邊語聽鶯報片雲飛趂春潮去紅軟長安道試回頭一㸃蓬萊翠小燕歸梁對雪醒坐上雲麓先生一片游塵拂鏡灣素影護梅殘行人無語看春山背東風兩蒼顔夢飛不到梨花外孤館閉更寒誰憐消渴老文園聽溪聲瀉氷泉解語花立春風雨併餞翁處靜江上之役簷花舊滴帳燭新啼香潤殘冬被淡煙疏綺凌波步暗阻傍牆挑薺梅痕似洗空㸃㸃年華别淚花鬢愁叉股籠寒綵燕沾雲膩還鬭辛盤葱翠念青絲牽恨曾試纎指雁回潮尾征帆去似與東風相避泥雲萬里應剪斷紅情緑意年少時偏愛輕憐和酒香宜睡祝英臺近餞陳少逸被倉臺檄行部問流花尋夢草雲暖翠微路錦雁峯前淺約晝行處不教嘶馬飛春一奩越鏡那銷盡紅吟緑賦送人去長絲初染柔黃晴和曉煙舞心事偷占鶯漏漢宫語趂得羅蓋天香歸來時候共留取玉闌春住烏夜啼題趙三畏舍館中海棠醉痕深暈潮紅睡初濃寒食來時池館舊東風銀燭換月西轉夢魂中明日春和人去繡屏空浪淘沙有得越中故人贈楊梅者為賦贈緑樹越溪灣過雨雲殷西陵人去暮潮還鉛淚結成紅粟顆封寄長安别味帶生酸愁憶眉山小樓燈外練花寒衫袖醉痕花唾在猶染微丹踏莎行潤玉籠綃檀櫻倚扇繡圈猶帶脂香淺榴心空疊舞裙紅艾枝應壓愁鬟亂午夢千山窗隂一箭香瘢新褪紅絲腕隔江人在雨聲中晚風菰葉生秋怨齊天樂與江湖諸友泛湖麴塵猶沁傷心水歌蟬暗驚春換露藻清啼煙蘿淡碧先結湖山秋怨波簾翠捲嘆霞薄輕綃汜人重見傍栁追涼暫疏懷袖負紈扇南花清鬭素靨畫船應不載坡靜詩卷泛酒芳筒題名蠧壁重集湘鴻江燕平蕪未剪怕一夕西風鏡心紅變望眼愁生暮天菱唱逺繞佛閣與沈野逸東臯天街盧樓追涼小飲夜空似水橫漢靜立銀浪聲杳瑶鏡奩小素娥乍起樓心弄孤照絮雲未巧梧韻露井偏借秋早暗情多少怕教徹膽寒光見懷抱浪迹尚為客恨滿長安千古道還記暗螢穿簾街語悄歎步影歸來人鬢花老紫簫天渺又露飲風前涼墮輕帽酒杯空數星橫曉秋蕊香七夕􅀈浴新涼睡早雪靨酒紅侵笑倚樓起把繡針小月冷秋波夢覺怕聞井葉西風到恨多少粉河不語墮秋曉雲雨人間未了疏影賦墨梅照舊刻暗香非占春壓一捲峭寒萬里平沙飛雪數㸃酥鈿萬古相思凌曉東風吹裂獨自曳橫梢瘦影入廣平裁氷詞筆記五湖清夜推篷臨水一痕微月何遜楊州舊事五更夢半醒胡調吹徹若把南枝圖入凌煙香滿玉樓瓊闕相將初試紅鹽味到煙雨青黃時節想雁空北落冬深淡墨晚天雲濶聲聲慢畿漕廨建新樓上梅津清漪街苑御水分流阿階西北青紅朱栱浮雲碧窗宿霧濛濛璇題淨橫秋影笑南飛不過新鴻延桂景見素娥梳洗微步瓊空城外湖山十里想無時長敞罨畫簾櫳暗栁回堤何須繫馬金狨鶯花翰林千首綵毫飛海雨天風鳯池上又相思春夜夢中木蘭花慢送翁五峯遊江送秋雲萬里算卷舒總何心歎路轉羊腸人營燕壘霜滿蓬簮愁侵庾塵滿袖便封侯那羡漢淮隂一醉蓴絲膾玉忍教菊老松深離音又聽西風金井樹動秋吟向暮江目斷鴻飛渺渺天色沈沈沾襟四絃夜語問楊瓊往事到寒砧爭似湖山歲晚靜梅香底同斟瑞鶴仙丙午重九亂雲生古嶠記舊遊惟怕秋光不早人生斷腸草歎如今搖落暗驚懷抱誰臨晚眺吹臺髙霜歌縹眇想西風此處留情肯著故山衰帽聞道萸香西市酒熟東鄰浣花人老金鞭騕裊追吟賦倩年少想重來新雁傷心湖上銷滅紅深翠窈小樓寒睡起無聊半簾晚照浪淘沙九日從吳見山覔酒山逺翠眉長髙處淒涼菊花清瘦杜秋娘淨洗緑杯牽露井聊薦幽香烏帽壓吳霜風力偏狂一年佳節過西廂秋色雁聲愁幾許都在斜陽水調歌頭賦方泉望湖樓屋下半流水屋上幾青山賞心千頃明鏡入座玉光寒雲起南峯未雨雲斂北峯初霽健筆寫青天俯瞰古城堞不礙小闌干繡鞍馬軟紅路乍回班層梯影轉停午信手展緗編殘照游船收盡新月書簾才捲入在翠壺間天際笛聲起塵世夜漫漫思佳客賦半面女髑髏叉燕櫳雲睡起時隔牆折得杏花枝青春半面粧如畫細雨三更花又飛輕愛别舊相知斷腸青塜幾斜暉亂紅一任風吹起結習空時不㸃衣垂絲釣雲麓先生以畫舫載洛花燕客德風聽雨春殘落花門掩乍倚玉闌旋剪天豔攜醉靨放遡溪游纜波光掩映燭花黯淡碎霞澄水吳宫初試菱鑑舊情頓減孤負深杯灩衣露天香染通夜飲問漏移幾㸃喜遷鶯賦王臞庵與閒堂煙空白鷺乍飛下似呼行人相語細縠春波微痕秋月曾認片帆來去萬頃素雲遮斷十二紅簾鈎處黯愁逺向虹腰時送斜陽凝竚輕許孤夢到海上幾宫玉冷深窗戶遙指人間隔江燈火漠漠水蘋搖莫看葺斷磯殘釣替却珠歌雪舞吟未了去匆匆清曉一闌煙雨西河陪鶴林先生登花園春乍霽清漣畫舫融泄螺雲萬疊黯凝秋黛蛾照水漫將西子比西湖溪邊人更多麗步危徑攀豔蕊掬霞到手紅碎青蛇細折小回廊去天半尺畫闌入暮起東風栱聲吹下人世海棠藉雨半繡地殘寒退初卸羅綺除酒消春何計高沙頭更續斜陽一醉雙玉杯和流花洗㸃絳唇推枕南窗練花寒入單紗淺雨簾不捲空礙調雛燕一握柔葱香染榴巾汗音塵斷盡羅閒扇山色天涯逺滿江紅餞方蕙巖赴闕竹下門敲又呼起蝴蝶夢清閒裏看鄰牆梅子幾度仁生燈外江湖多夜雨月邊河漢獨晨星向草堂清曉卷琴書猿鶴驚宫漏靜朝馬鳴西風起已關情料希音不在女瑟媧笙蓮蕩折花香未晚野舟橫渡水初晴看髙鴻飛上碧雲中秋一聲祝英臺近春日客龜溪遊廢圃採幽香巡古苑竹冷翠微路鬭草溪根沙印小蓮步自憐兩鬢清霜一年寒食又身在雲山深處晝閒度因甚天也慳春輕隂便成雨緑暗長亭歸夢趂風絮有情花影闌干鶯聲門徑解留我霎時凝竚珍珠簾春日客龜溪過貴人家隔牆聞簫鼓聲疑是按舞竚立久之蜜沈爐暖餘煙裏竚立行人官道麟帶壓愁香聽舞簫雲渺恨縷情絲春絮逺悵夢隔銀瓶難到寒峭有東風垂栁學得腰小還近緑水清明歎孤身如燕將花頻繞細雨溼黃昏半醉歸懷抱蠧損歌紈人去久漫淚沾香蘭如笑書杳念客枕幽單看春漸老滿江紅甲辰歲盤門外寓居過重午結束蕭仙嘯梁鬼依還未滅荒城外無聊閒看野煙一抹梅子未黃愁夜雨榴花不見簮秋雪又金羅紅字寫香詞年時節簾底事慿燕說合歡縷雙條脫自香銷紅臂舊情都别湘水離魂菰葉怨揚州無夢銅華闕倩卧簫吹裂晚天雲看新月木蘭花慢餞趙山臺指罘罳曉月動涼信又催歸正玉漲松波花穿畫舫無限紅衣青絲傍橋淺繫問笛中誰奏鶴南飛西子氷綃冷處素娥寶鏡圓時清竒好借秋光臨水色寫瑶巵向醉中織就天孫雲錦一杼新詩依稀數聲禁漏又東華塵染帽簷緇爭似西風小隊便乘鱸膾秋肥極相思題陳藏一水月梅扇玉纎風透秋痕涼與素懷分乘鸞歸後生綃淨剪一片氷雲心事孤山春夢在到思量猶斷詩魂水清月冷香銷瘦影人立黃昏醉蓬萊和方南山韻碧天書信斷寶枕香留淚痕盈袖誰識秋娥比行雲纎瘦象尺􅝪爐翠鍖金縷記倚牀同繡月蟬瓊梳氷銷粉汗南花􅝪透盡是當時少年清夢臂約痕深帊綃紅皺慿鵲傳音恨語多輕漏潤玉留情沈郎無奈向栁隂期候數曲催闌雙鋪深掩風鐶鳴獸三部樂賦姜石帚漁隱江鶂初飛蕩萬里素雲際空如沫詠情吟思不在秦筝金屋夜潮上明月蘆花傍釣蓑夢逺句清敲玉翠罌汲曉欸乃一聲秋曲片篷障雨乘風半竿渭水伴鷺汀幽宿那知暖袍挾錦低簾籠燭鼓春波載花萬斛帆鬛轉銀河可掬風定浪息滄茫外天浸寒緑秋思耗荷塘為括蒼名姝求賦聽雨小閣堆枕香鬟側驟夜聲偏稱畫屏秋色風碎串珠潤侵歌板愁壓眉窄動羅箑清商寸心低訴叙怨抑映夢窗零亂碧待漲緑春深落花香泛料有斷紅流處暗題相憶歡夕簷花細滴送故人粉黛重飾漏侵瓊瑟丁東敲斷弄晴月白怕一曲霓裳未終催去驂鳯翼歎謝客猶未識漫瘦却東陽燈前無夢到得路隔重雲雁北法曲獻仙音賦秋晚紅白蓮風拍波驚露零秋覺斷緑衰紅江上豔拂潮粧淡凝氷靨别翻翠池花浪過數㸃斜陽雨啼綃粉痕冷宛相向指汀洲素雲飛過清麝洗玉井曉霞珮響寸藕折長絲何郎心似春風蕩半掬微涼嬌蟬聲逺度菱唱伴鴛鴦秋夢酒醒月斜輕帳愁春未醒侍雲麓先生登飛翼樓觀雲東風未起花上纎塵無影峭雲溼凝酥深塢洗梅清釣捲愁絲冷浮虹氣海空明若耶門閉扁舟去懶客思鷗輕幾度問春倡紅冶翠空媚隂晴看真色千巖一素天淡無情醒看重開玉鈎簾外曉峯青相扶輕醉越山更上臺最高層月中行和黃復庵疏桐翠井蚤驚秋葉葉雨聲愁燈前倦客老貂裘燕去栁邊樓吳宫寂莫空煙水渾不認舊采菱洲秋花旋結小盤虬蝶怨夜香留夢窗丙稿卷三
