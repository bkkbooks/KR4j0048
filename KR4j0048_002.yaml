夢縞衣解珮溪邊最愁人啼鳥晴明葉底清圓又送王厯陽以右曹赴闕淝水秋寒淮堤柳色别來幾換年光紫馬行遲才生夢草池塘便乘丹鳳天邊去禁漏催春殿稱觴過松江雪弄飛花冰解鳴璫芳洲酒社詞場賦髙臺陳迹曾醉吳王重上逋山詩清月瘦昏黃春風侍女衣篝畔早鵲袍已暖天香到東園應費新題千樹苔蒼又壽毛荷塘風裊垂楊雪消蕙草何如清潤潘郎風月襟懷揮毫倚馬成章仙都觀裏桃千樹映麴塵十里荷塘未歸來應戀花洲醉玉吟香東風晴晝如酒正十分皓月一半春光燕子重來明朝傅夢西窗朝寒幾暖金爐燼料洞天日月偏長杏園詩應待先題嘶馬平康倦尋芳上元海霞倒影空霧飛香天市催晚暮靨宫梅相對畫樓簾捲羅襪輕塵花笑語寶叉爭艷春心眼亂簫聲正風柔柳弱舞肩交燕念窈窕東鄰深巷燈外歌沉月上花淺夢雨離雲㸃㸃漏壺清怨珠絡香銷空念住紗窗人老羞相見漸銅壺閉春隂曉寒人倦三姝媚詠春情吹笙池上道為王孫重來旋生芳草水石清寒過半春猶自燕沉鶯悄稚柳闌干晴蕩漾禁烟殘照往事依然爭忍重聽怨紅凄調曲榭方亭初掃印蘚迹雙鴛記穿林窈頓隔年華似夢回花上露晞平曉恨逐孤鴻客又去清明還到便鞚牆頭歸騎青梅已老又過都城舊居有感湖山徑醉慣漬春衫啼痕酒痕無限又客長安嘆斷襟零袂汙塵誰浣紫曲門荒沿敗井風搖青蔓對語東鄰猶是曾巢謝堂雙燕春夢人間須斷但惟得當年夢緣能短繡屋秦箏傍海棠偏愛夜淺開宴舞歇歌沉花未減紅顔先變竚久河橋欲去斜陽淚滿晝錦堂有感無影燈前簫聲酒外獨鶴華表重歸舊雨殘雲仍在門巷都非愁結春情迷醉眼老憐秋鬢倚蛾眉難忘處猶恨繡籠無端誤放鶯飛當時征路遠歡事差十年輕負心期楚夢秦樓相遇共嘆相違淚香沾溼孤山雨瘦腰折損六橋絲何時向忩下剪殘紅燭夜杪參移又過種山即越文種墓帆落回潮人歸故國山椒感慨重遊弓折霜寒機心已墮沙鷗燈前寶劒清風斷正五湖雨笠扁舟最無情岩上閒花腥染春愁當時白石蒼松路解勒回玉輦霧掩山羞木客歌闌青春一夢荒丘年年古苑西風到雁怨啼緑水葓秋暮登臨幾樹殘烟西北髙樓漢宫春追和尹梅津賦俞園牡丹花姥來時帶天香國艷羞掩名姝日長半嬌半困宿酒微蘇沉香檻北比人間風異烟殊春恨重盤雲墜髻碧花翻吐瓊盂洛苑舊移仙譜向吳娃深館曾奉君娛猩脣露紅未洗客鬢霜鋪蘭詞沁壁過西園重載雙壺休漫道花扶人醉醉花却要人扶花心動郭清華新軒入眼青紅小玲瓏飛􅀢度雲微溼繡檻展春金屋寬花誰管采菱波狹翠深知是深多少都不放夕陽紅入待粧綴新漪漲翠小圓荷葉此去春風滿篋應時鎖蛛絲淺虛塵榻夜雨試燈晴雪次梅趂取玳簪重盍捲簾不解招新燕春須笑酒慳歌澀半窗掩日長困生翠睫又柳十里東風裊垂楊長似舞時腰瘦翠館朱樓紫陌青門處處燕鶯晴晝乍看搖曳金絲袖春淺映鵝黃如酒嫩隂裏煙滋露染翠嬌紅溜此際雕鞍去久空追念郵亭短枝盈首海角天涯寒食清明淚㸃絮花沾袖遠年折贈行人逺今年恨依然纎手斷腸也羞眉畫應未就八聲甘州陪庚幕諸公遊靈岩渺空烟四遠是何年青天墜長星幻蒼崖雲樹名娃金屋殘霸宫城箭徑酸風射眼膩水染花腥時靸雙鴛響廊葉秋聲宫裏吳王沉醉倩五湖倦客獨釣醒醒問蒼天無語華髮奈山青水涵空闌干髙處送亂鴉斜日落漁汀連呼酒上琴臺去秋與雲平又姑蘇臺和施藝隱韻步晴霞倒影洗閒愁深杯灔風漪望越來清淺吳歈杳靄江鴈初飛輦路凌空九險粉冷濯粧池歌舞煙霄頂樂景沉暉别是青紅闌檻對女墻山色碧淡空眉問當時遊鹿應笑古臺非有誰招扁舟漁隱但寄情西子却題詩閒風月暗消磨盡浪打鷗磯又和梅津記行雲夢影步凌波仙衣剪芙蓉念杯前燭下十香揾袖玉暖屏風分種寒花舊盎蘚土蝕吳蛬人遠雲槎渺煙海沉蓬重訪樊姬鄰里怕等閒易别那忍相逢試潛行幽曲心蕩匆匆井梧凋銅鋪低亞映小眉瞥見立驚鴻空惆悵醉秋香畔往事朦朧新鴈過粧樓秋感夢醒芙蓉風簷近渾疑珮玉丁東翠微流水都是惜别行蹤宋玉秋花相比瘦賦情更苦似秋濃小黃昏紺雲暮合不見征鴻宜城當時放客認燕泥舊迹返照樓空夜闌心事燈外敗壁寒蛩江寒夜楓怨落怕流作題情腸斷紅行雲遠料淡蛾人在秋香月中又中秋後一夕李方菴月庭延客命小妓過新水令坐間賦詞閬苑髙寒金樞動冰宫桂樹年年剪秋一半難破萬户連環織錦相思樓影下鈿叉暗約小簾間共無眠素娥慣得西墜闌干誰知壺中自樂正醉圍夜玉淺鬭嬋娟鴈風自徑雲氣不上凉天紅牙潤沾素手聽一曲清歌雙霧鬟徐郎老恨斷腸聲在離鏡孤鸞凄凉調合肥巷陌皆種柳秋風夕起騷騷然余客居闔戶時聞馬嘶出城四顧則荒煙野草不勝凄黯乃著此解琴有凄凉調假以為名凡曲言犯者謂以宫犯商商犯宫之類如道調宫上字住雙調亦上字住所住字同故道調曲中犯雙調或于雙調曲中犯道調其他準此唐人樂書云犯有正旁偏側宫犯宫為正宫犯商為旁宫犯角為偏宫犯羽為側此說非也十二宫所住字各不同不容相犯十二宫特可犯商角羽耳余歸行都以此曲示國上田正德使以亞觱篥吹之其韻極美亦曰瑞鶴仙影緑楊巷陌秋風起邊城一弓離索馬嘶漸遠人歸甚處戍樓吹角情懷甚惡更衰草寒煙淡薄似當時將軍部曲迤邐度沙漠追念西湖上小舫攜歌晚花行樂舊遊在否想如今翠凋紅落漫寫羊裙等新鴈來時繫著怕匆匆不肯寄與誤後約尾犯夜雨滴空階孤館夢回情緒蕭索一片閒愁想丹青難摸秋漸老蛩聲正苦夜將闌燈花漸落最無端處忍把良宵只恁孤眠却佳人應怪我自别後寡信輕諾記得當時剪香雲為約甚時向幽閨深處按新詞流霞共酌再同歡笑肯把金玉珠珍博東風第一枝情傾國傾城非花非霧春風十里獨步勝如西子妖嬈更比太真淡竚鉛華不御漫道有巫山洛浦似恁地標格無雙鎮鎖畫樓深處曾被風容易送去曾被月等閒留住似花翻使花羞似柳任從柳妬不教歌舞恐化綵雲輕舉信下蔡陽城俱迷看取宋玉詞賦夜合花自鶴江入京泊葑門外有感柳瞑河橋鶯暗臺苑短縈頻惹春香當時夜泊溫柔便入深鄉詞韻窄酒杯長剪蠟花壺箭催忙共追遊處凌波翠陌連棹橫塘十年一夢凄凉似西湖燕去吳館巢荒重來萬感依前喚酒銀缸溪雨急岸花狂趂殘鴉飛過滄茫故人樓上憑誰指與芳草斜陽夢窗乙稿卷二
