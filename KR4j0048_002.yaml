body:
  text: 夢窗乙稿卷二宋吳文英撰江神子李别駕招飲海棠花下翠紗籠袖映紅霏冷香飛洗凝脂睡足嬌多還是夜深宜翻怕回廊花有影移燭暗放簾垂尊前不按駐雲詞料花枝妒蛾睂丁祝東風莫送片紅飛春重錦堂人盡醉和曉月帶花歸又送桂花吳憲時已有檢詳之命未赴闕天街如水翠塵空建章宫月明中人未歸來玉樹起秋風寶粟萬釘花露重催賜帶過垂虹夜涼沉水繡簾櫳酒香濃霧濛濛叉列吳娃腰裊帶金蟲三十六宫蟾觀冷留不住珮丁東又十日荷塘小隱賞桂呈朔翁西風來晚桂開遲月宫移到東籬䔩䔩驚塵吹下半冰規擬喚阿嬌來小隱金屋底亂香飛重陽還是隔年期蝶相思客情知吳水吳烟愁裏更多詩一夜看承應未别秋好處雁來時又送翁五峯自鶴江還都西風一葉送行舟淺遲留艤汀洲新浴紅衣緑水帶香流應是離宫城外晚人竚立小簾鈎新歸重省别來愁黛眉頭半痕秋天上人間斜月繡針樓湘浪莫迷花蝶夢江上約負輕鷗風入松為友人訪琴客賦春風吳柳幾番黃歡事小蠻窗梅花正結雙頭夢玉龍吹散幽香昨夜燈前欹黛今朝陌上啼妝最憐無侣伴雛鶯桃葉已春江曲屏先暖鴛衾慣夜寒深都是思量莫道藍橋路遠行雲只隔幽坊又春晚感懷聽風聽雨過清明愁草瘞花銘樓前緑暗分攜路一絲柳一寸柔情料峭春寒中酒交加曉夢啼鶯西園日日掃林亭依舊賞新晴黃蜂頻撲秋千索有當時纎手香凝惆悵雙鴛不到幽階一夜苔生又桂蘭舟高蕩漲波涼愁被矮橋坊暮煙疏雨西園路誤秋娘淺約宫黃還泊郵亭喚酒舊曾送客斜陽蟬聲空曳别枝長似曲不成商御羅屏底翻歌扇憶西湖臨水開窗和醉重尋幽夢殘衾已斷薰香又鄰舟妙香畫船簾密不藏香飛作楚雲狂傍懷半捲金罏燼怕暖消春日朝陽清馥晴薰殘醉斷烟無限思量憑闌心事隔垂楊樓燕鎖幽粧梅花偏惱多情月慰溪橋流水昏黃哀曲霜鴻悽斷夢魂寒蝶悠揚豐樂樓節齊新建此樓夢窗淳熙十一年二月甲子作是詞大書于壁望幸焉天吳駕雲閬海凝春空燦綺倒銀海蘸影西城四碧天鏡無際綵翼曳扶搖宛轉雩龍降尾交新霽近玉虛高處天風笑語吹墜清濯緇塵快展曠眼傍危欄醉倚面屏障一一鶯花薜蘿浮動金翠慣朝昏晴光雨色燕泥動紅香流水步新梯藐視年華頓非塵世麟翁衮舄領客登臨座有誦魚美翁笑起離席而語敢詫京兆以後為功落成竒事明良慶㑹賡歌熙載隆都觀國多閒暇遣丹青雅飾繁華地平瞻太極天街潤納璇題露牀夜沉秋緯清風觀闕麗日罘罳正午長漏遲為洗盡脂痕茸唾淨捲麴塵永晝低垂繡簾十二髙軒駟馬峩冠鳴珮班回花底修禊飲御爐香分朝衣袂碧桃數㸃飛花湧出宫溝遡春萬里又春晚感懷殘寒政欺病酒掩沉香繡戶燕來晚飛入西城似說春事遲暮畫船載清明過却晴烟冉冉吳宫樹念羈情遊蕩隨風化為輕絮十載西湖傍柳繫馬趂嬌塵軟霧遡紅漸招入仙溪錦兒偷寄幽素倚銀屏春寬夢窄斷紅溼歌紈金縷暝堤空輕把斜陽總還鷗鷺幽蘭旋老杜若還生水鄉尚寄旅别後訪六橋無信事往花委瘞玉埋香幾番風雨長波妒盼遙山羞黛漁燈分影春江宿記當時短楫桃根渡青樓倣佛臨分敗壁題詩淚墨慘淡塵土危亭望極草色天涯嘆鬢侵半苧暗㸃檢離痕歡唾尚染鮫綃嚲鳳迷歸破鸞慵舞殷勤待寫書中長恨藍霞遼海沈過雁漫相思彈入哀箏柱傷心千里江南怨曲重招斷魂在否又詠荷和趙修全韻橫塘穿棹艷錦引鴛鴦弄水斷霞晚笑折花歸紺紗低護燈蕊潤玉瘦冰輕倦浴斜拖鳳股盤雲墜聽銀牀聲細梧桐漸覺凉思窗隙流光過如迅羽訴空梁燕子誤驚起風竹敲門故人還又不至記琅玕新詩細掐早陳迹香痕纎指怕因循羅扇恩疏又生秋意西湖舊日畫舸頻移嘆幾縈夢寐霞佩冷疊瀾不定麝藹飛雨乍濕鮫綃暗盛紅淚練單夜共波心宿處瓊簫吹月霓裳舞向明朝未覺花容悴嫣香易落回頭淡碧銷烟鏡空畫羅屏裏殘蟬度曲唱徹西園也感紅怨翠念省慣吳宫幽憩暗柳追凉曉岸參斜露零漚起絲縈寸藕留連歡事桃笙平展湘浪影有昭華穠李冰相倚如今鬢㸃凄霜半篋秋詞恨盈蠧紙天香蠟梅蟬葉粘霜蠅苞綴凍生香遠帶風峭嶺上寒多溪頭月冷北枝瘦南枝小玉奴有姊先占立牆隂春早初試宫黃淡薄偷分夀陽纎巧銀燭淚深未曉酒鍾慳貯愁多少記得短亭歸馬暮衙蜂鬧豆蔻叉梁恨裊但悵望天涯歲華老遠信難封吳雲雁杳玉漏遲春情絮花寒食路晴絲罥日緑隂吹霧客帽欺風愁滿畫船烟浦綵挂秋千散後悵塵鎖燕簾鶯戶從間阻夢雲無凖鬢霜如許夜久繡閣藏嬌記掩扇傳歌剪燈留語月約星期細把花鬚頻數彈指一襟怨恨漫空倩啼鵑聲訴深院宇黃昏杏花微雨又春情古腔杏香飄禁苑須知自古皇州春早燕子來時繡陌漸薰芳草蕙圃夭桃過雨弄碎影紅篩碧沼深院悄緑楊盡日鶯聲爭巧早是賦得多情更對景臨風鎮辜歡笑數曲闌干故人漫勞登眺天際微雲過盡亂峯鎖一竿殘照歸路杳東風淚零多少金盞子賦秋壑西湖小築卜築西湖種翠蘿猶傍軟紅塵裏來往載清吟為偏愛吾廬畫船頻繫笑攜雨色晴光入春明朝市石橋鎖烟霞五百名仙第一人是臨酒論深意流光轉鶯花任亂委泠然九秋肺腑應多夢岩扃冷雲空翠潄流枕石幽情寫漪蘭緑綺轉城處他山小隊登臨待西風起又吳城連日賞桂一夕風雨悉已零落獨寓窗晚花方作小蕾未及見開有新邑之役朅來西館籬落間嫣然一枝可愛見似人而喜為賦此解賞月梧園恨廣寒宫樹曉風搖落莓砌掃珠塵空腸斷薰爐燼消殘萼殿秋尚有餘花鎖烟窗雲幄新雁又無端送人江上短亭初泊籬角夢依約人一笑惺忪翠袖薄悠然醉魂喚醒幽叢畔凄香霧雨漠漠晚吹乍顫秋聲早屏空金雀明朝想猶有數㸃蜂黃伴我斟酌永遇樂過李氏晚粧閣見壁間舊所題詞遂再賦春酌沉沉晚粧的的仙夢遊慣錦溆維舟青門倚蓋還被籠鶯喚裴郎歸後崔娘沉恨漫客請傳芳卷聨題在頻經翠袖勝隔紺紗塵幔桃根杏葉膠粘緗縹幾回憑闌人換峨髻愁雲蘭香膩粉都為多情褪離巾拭淚征袍染醉强作酒朋花伴留連怕風姨浪妒又吹雨斷又探梅次時齊韻閣雪雲低卷沙風急驚雁失序戶掩寒宵屏閒冷夢燈颭脣語似堪憐窗景都閒刺繡但續舊愁一縷鄰歌散羅襟印粉袖濕蒨桃紅露西湖舊日留連清夜愛酒幾將花誤遺襪塵消題裙墨黯天遠吹笙路吳臺直下緗梅無限未放野橋香度重謀醉揉香弄影水清淺處玉蝴蝶秋感角斷籖鳴疏㸃倦螢透隙低弄書光一寸悲秋生動萬種凄凉舊衫染唾凝花碧别淚想粧洗蜂黃楚魂傷雁汀沙冷來信微茫都忘孤山舊賞水沉尉露岸錦宜霜敗葉題詩御溝應不到流湘數客路又隨淮月羡故人還買吳航兩凝望滿城風雨催送重陽又秋恨晚雨未催宫樹可憐閒葉猶抱凉蟬短景歸秋吟思又接愁邊漏初長夢魂難禁人漸老風月俱寒想幽歡土花庭甃蟲網闌干無端啼蛄攪夜恨隨團扇苦近秋蓮一曲當樓謝娘懸淚立風前故園晚强留詩酒新雁遠不致寒暄隔蒼烟楚香羅袖誰伴嬋娟絳都春元夕融和又報乍瑞靄霽色皇都春早翠幰競飛玉勒爭馳都門道鼇山綵結蓬萊島向晚景雙龍銜照絳綃樓上彤芝蓋底仰瞻天表縹眇風傳帝樂慶三殿共賞羣仙同到迤邐御香飄滿人間聞嬉笑須臾一㸃星球小漸隱隱鳴鞘聲香遊人月下歸來洞天未曉又為郭清華內子壽香深霧暖正人在錦瑟年華深院舊日漢宫分得紅蘭滋吳苑臨池羞落梅花片弄水月初勻妝靣紫烟籠處雙鸞共跨洞簫低按歌管紅圍翠袖凍雲外似覺東風先轉繡畔晝遲花底天寬春無限仙郎驕馬瓊林宴待捲上珠簾教看更傳鶯入新年寶叉夢燕又為李篔房量珠賀情粘舞線悵駐馬灞橋天寒人遠旋剪露痕移得春嬌栽瓊苑流鶯長語烟中怨恨三月飛花零亂艷陽歸後紅藏翠掩小坊幽院誰見新腔按徹背燈暗共倚寶屏葱蒨繡被夢輕金屋裝深沉香換梅花重洗春風面正溪上參橫月轉並禽飛上金沙瑞香雲暖又燕亡久矣京口適見似人悵怨有感南樓墜燕又燈暈夜凉疏簾空捲葉吹暮喧花露晨晞秋光短當時明月娉婷畔悵客路幽扃俱遠霧鬟依約除非照影鏡空不見别館秋娘乍識似人處最在雙波凝盼舊色舊香閒雨閒雲情終淺丹青難畫真真面便只作梅花頻看更愁花變梨霙又隨夢散畔當作伴又余往來清華池館六年賦咏屢以感昔傷今益不堪懷乃復作此解春來雁渚弄艷冶又入垂楊如許困舞瘦腰啼濕宫黃池塘雨碧沿蒼蘚雲根路尚追想凌波微步小樓重上憑誰為唱舊時金縷凝竚烟蘿翠竹缺羅袖為倚天寒日暮强醉梅邊招得花奴來尊俎東風須惹春雲住莫把飛瓊吹去便教移取薰籠夜溫繡戶惜秋華重九細響殘蛩傍燈前似說深秋懷抱怕上翠微傷心亂烟殘照西湖鏡掩塵沙翳曉影秦鬟雲擾新鴻喚凄凉漸入紅萸烏帽江上故人老視東籬秀色依然娟好晚夢趂鄰杵斷乍將愁到秋娘淚濕黃昏又滿城雨輕風小閒了看芙蓉畫船多少又七夕露罥蛛絲小樓隂墮月秋驚華鬢宫漏未央當時鈿叉送遺恨人間夢隔西風算天上年華一瞬相逢縱相疏勝却巫陽無準何處動凉訊聽露井梧桐楚騷成韻綵雲斷翠羽散此情難問銀河萬古秋聲但望中婺星清潤輕俊度金針漫牽方寸又七夕前一日送人歸鹽官數日西風打秋林棗熟還催人去瓜果夜深斜河擬看星度匆匆便倒離尊悵遇合雲銷萍聚留連有殘蟬韻晚時歌金縷緑水暫如許奈南牆冷落竹烟槐雨此去杜曲已近紫霄尺五扁舟夜宿吳江正水珮霓裳無數眉嫵問别來解相思否又木芙蓉路遠仙城自玉郎去却芳卿憔悴錦段鏡空重鋪步幢新綺凡花瘦不禁秋幻膩玉腴紅鮮麗相攜試新粧乍畢交扶輕醉長記斷橋外驟玉驄過處千嬌凝睇昨夢頓醒依約舊時眉翠愁邊暮合碧雲倩唱入六么聲裏風起舞斜陽闌干十二大曲六么王子喬芙蓉城事有樓名碧雲惜黃花慢次吳江小泊夜飲僧窗惜别邦乂趙簿㩦小妓侑尊連歌數闋皆清真詞酒盡已四鼓賦此詞餞尹梅津送客吳臯正試霜夜冷楓落長橋望天不盡背城漸杳離亭黯黯恨水迢迢翠香零落紅衣老暮愁鎖殘柳眉梢念瘦腰沈郎舊日曾繫蘭橈仙人鳳咽瓊簫悵斷魂送遠九辨難招醉鬟留盼小窗剪燭歌雲載恨飛上銀霄素秋不解隨船去敗紅趂一葉寒濤夢翠翹怨紅料過南譙十二郎垂虹橋屬上有垂虹亭吳江素天際水浪拍碎凍雲不凝記曉葉題霜秋燈吟雨曾繫長橋過艇又是賔鴻重來後猛賦得歸期才定嗟繡鴨解言香鱸堪釣尚廬人境幽興爭如共載越娥粧鏡念倦客依前貂裘茸帽重向淞江照影酹酒滄茫倚歌平遠亭上玉虹腰冷迎醉面暮雪飛花幾㸃黛愁山暝燭影搖紅壽嗣榮王天桂飛香御花簇座千秋宴笑從王母摘仙桃瓊醴雙金盞掌上龍珠照眼映羅圖星暉海潤浮槎遠到水淺蓬萊秋明河漢寶月將弦晚鈎斜掛西簾捲未須十日便中秋爭看清光滿淨洗紅塵障靣賀朝霖催班正殿喜回天上紫府開筵瑤池宣勸又賦德清縣圃古紅梅莓鎖虹梁稽山祠下當時見橫斜無分照溪光珠網空凝遍姑射青春對面駕飛虬羅浮路遠千年春在新月苔池黃昏山館花滿河陽為君羞褪晨妝蒨雲根直下是銀河客老秋槎變雨外紅鉛洗斷又晴霞驚飛暮管倚闌只怕弄水鱗生乘東風便醜奴兒麓翁飛翼樓觀雪東風未起花上纎塵無影峭雲濕凝酥深塢乍洗梅青鈎簾愁絲冷浮虹氣海空明若耶門閉扁舟去懶客思鷗輕幾度問春倡紅冶翠空媚隂晴看真色千岩一素天淡無情醒眼重開玉鉤簾外曉峰青相扶輕醉越王臺上更