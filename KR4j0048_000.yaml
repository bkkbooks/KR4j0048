body:
  text: 夢窗稿詞曲類一詞集之屬提要臣等謹按夢窗稿四卷補遺一卷宋吳文英撰文英字君特夢窗其自號也慶元人所著詞有甲乙丙丁四稿毛晉初得其丙丁二稿刻於宋詞第五集中復托其絶筆一篇佚詞九篇附于卷末續乃得甲乙二稿刻之第六集中晉原跋此本即晉所刻而四稿合為一集則又後人所移併也所録絶筆鶯啼序一首殘缺過半而乃有全文在乙稿補遺之中綘都春一首亦先載乙稿之中今卷末仍未削去是亦刋非一時失于檢校之故矣其分為四集之由不甚可解晉跋稱文英謝世之後同遊集其丙丁兩年稿釐為二卷按文英卒于淳祐十一年辛亥不應獨丙丁二年有詞且丙稿有乙已所作永遇樂甲辰所作滿江紅而甲午嵗旦一首乃介于其中丁稿有癸卯所作思佳客壬寅所作六醜甲辰所作鳯棲梧而丙午所作西江月亦在卷內則丙丁二稿不應分屬丙丁二年且甲稿有癸卯作乙稿有端平丙申作淳祐辛亥作亦絶不以編年為序疑其初不自收拾後裒輯舊作得一卷即為一集以十干為之標目原未嘗排比先後耳文英及與姜䕫辛棄疾游倡和具載集中而又有夀賈似道諸作殆亦晚節頽唐如朱希真陸游之比其詞則卓然南宋一大宗沈泰嘉樂府指迷稱其深得清真之妙但用事下語太晦處人不易知張炎樂府指迷亦稱其如七寶樓臺炫人眼目折碎下來不成片段所短所長評品皆為平允蓋其天分不及周邦彥而研錬之功則過之詞家之有文英亦如詩家之有李啇隱也其稿屢經傳寫多有訛脫如朱存理鐵網珊瑚載文英手書江南春詞題下注張筠莊杜衡山莊而刻本佚上三字是其明證他如夜飛鵲後闋輕冰潤句輕字上當脫一字解語花門橫皺碧一首後闋冷雲荒翠句翠字與全首之韻不叶塞翁吟别一首後闋吳女暈濃句女字據譜當作平聲髙山流水後闋唾碧窗噴花茸句音律不叶文義亦不可解惜紅衣一闋仿白石調而作後闋當時醉近繡箔夜吟句止八字考姜䕫原詞作維舟試望故國渺天北句實九字不惟少一字且脫一韻齊天樂尾句畫旗塞鼓據譜尚脫一字垂絲釣前闋波光掩映燭花黯淡二句掩字不應叶又不宜作四字句繞佛閣舊霞艷錦一首前闋東風搖揚花絮下闕三字然花絮二字乃句尾押韻以前詞怕教徹膽寒光見懷抱句推之則闕字當在花絮二字之上毛本校刋皆未及是正至乙亥之醜奴兒慢丙稿又易其名曰愁春未醒則因潘元質此詞以愁春未醒作起句故後人又有此名據以追改舊題尤乖舛矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀
