body:
  text: 鶯啼序闕吳駕雲閬海闕春空燦綺倒銀海燕影西城闕天鏡無際綵翼曳扶搖宛轉雲龍虹尾交相曳闕髙處闕笑語吹墜清濯緇塵闕屏障一一鶯花薜蘿闕紅香流水闕領客闕離席而語敢詫京兆闕成良慶會賡歌熙載隆都闕閒暇遺闕雅飾繁華地平瞻太極闕天闕納璇題靜夜沈秋闕風觀闕麗日闕正午洗盡脂痕茸唾淨捲麯塵永晝低垂繡帷十二髙軒駟馬峩冠鳴珮班回花底修禊飲御爐香分惹朝衣袂碧桃數㸃飛花湧出宫溝陽春萬里淳祐十一年二月甲子四明吳文英君特書
